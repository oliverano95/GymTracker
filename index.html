<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pebble Gym Tracker Setup</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #FF4700;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #e64000; }
        
        /* New Styles for our extra features */
        .exercise-item {
            background: #eee;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .small-btn {
            width: auto;
            padding: 5px 8px;
            margin: 0 0 0 5px;
            font-size: 12px;
            display: inline-block;
        }
        .delete-btn { background-color: #dc3545; }
        .delete-btn:hover { background-color: #c82333; }
        .flex-row { display: flex; gap: 10px; }
        .secondary-btn { background-color: #6c757d; }
        .secondary-btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>

    <h2>Gym Routine Setup</h2>

    <div class="card">
        <h3>Manage Files</h3>
        <div class="flex-row">
            <button class="secondary-btn" onclick="document.getElementById('importFile').click()">Load Routine</button>
            <button class="secondary-btn" onclick="exportJSON()">Save to File</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importJSON(event)">
    </div>

    <div class="card">
        <label>Routine Name:</label>
        <input type="text" id="routineName" placeholder="e.g., Push Day, Leg Day">
    </div>

    <div class="card">
        <h3 id="formTitle">Add Exercise</h3>
        <select id="exerciseSelect"></select>
        <input type="number" id="targetSets" placeholder="Target Sets (e.g., 3)">
        <input type="number" id="targetReps" placeholder="Target Reps (e.g., 10)">
        <input type="number" id="targetWeight" placeholder="Target Weight in kg (e.g., 60)">
        
        <button id="addUpdateBtn" onclick="addExercise()">+ Add to Routine</button>
    </div>

    <div class="card">
        <h3>Your Routine:</h3>
        <div id="routineList">
            <p id="emptyMessage" style="color: gray; font-size: 12px;">No exercises added yet.</p>
        </div>
    </div>

    <button onclick="saveAndSend()">Save & Send to Pebble</button>

    <script>
        const exerciseDatabase = [
            "Bench Press", "Squat", "Deadlift", "Overhead Press", 
            "Pull Ups", "Barbell Row", "Bicep Curls", "Tricep Extensions", 
            "Dumbbell Flies", "French Press", "Target Abs", "Leg Raise", 
            "Chest Pull", "Facepull", "Hammer Curl", "Cable Crunch", "Pallof Press", 
            "Leg Press", "Leg Extension", "Leg Curl", "Calf"
        ];

        let myRoutine = [];
        let editingIndex = -1; // -1 means we are adding new, not editing

        // Populate dropdown on load
        window.onload = function() {
            const dropdown = document.getElementById("exerciseSelect");
            for (let i = 0; i < exerciseDatabase.length; i++) {
                let newOption = document.createElement("option");
                newOption.value = exerciseDatabase[i];
                newOption.text = exerciseDatabase[i];
                dropdown.appendChild(newOption);
            }
        };

        // Redraw the entire routine list based on the array
        function renderRoutine() {
            const listDiv = document.getElementById("routineList");
            listDiv.innerHTML = ""; // Clear current list

            if (myRoutine.length === 0) {
                listDiv.innerHTML = '<p id="emptyMessage" style="color: gray; font-size: 12px;">No exercises added yet.</p>';
                return;
            }

            for (let i = 0; i < myRoutine.length; i++) {
                let ex = myRoutine[i]; // ex is our array: [Name, Sets, Reps, Weight]
                let div = document.createElement("div");
                div.className = "exercise-item";
                
                // Text for the exercise
                let info = document.createElement("div");
                info.innerHTML = `<strong>${ex[0]}</strong><br>${ex[1]}s x ${ex[2]}r @ ${ex[3]}kg`;
                
                // Buttons container
                let btnGroup = document.createElement("div");
                btnGroup.innerHTML = `
                    <button class="small-btn secondary-btn" onclick="editExercise(${i})">Edit</button>
                    <button class="small-btn delete-btn" onclick="deleteExercise(${i})">X</button>
                `;

                div.appendChild(info);
                div.appendChild(btnGroup);
                listDiv.appendChild(div);
            }
        }

        function addExercise() {
            const name = document.getElementById("exerciseSelect").value;
            const sets = document.getElementById("targetSets").value;
            const reps = document.getElementById("targetReps").value;
            const weight = document.getElementById("targetWeight").value;

            if(sets === "" || reps === "" || weight === "") {
                alert("Please fill out sets, reps, and weight!");
                return;
            }

            const newExercise = [name, parseInt(sets), parseInt(reps), parseInt(weight)];

            if (editingIndex === -1) {
                // Adding a new exercise
                myRoutine.push(newExercise);
            } else {
                // Updating an existing exercise
                myRoutine[editingIndex] = newExercise;
                editingIndex = -1; // Reset back to add mode
                document.getElementById("formTitle").innerText = "Add Exercise";
                document.getElementById("addUpdateBtn").innerText = "+ Add to Routine";
            }

            renderRoutine(); // Redraw screen

            // Clear inputs
            document.getElementById("targetSets").value = "";
            document.getElementById("targetReps").value = "";
            document.getElementById("targetWeight").value = "";
        }

        function deleteExercise(index) {
            myRoutine.splice(index, 1); // Remove 1 item at the given index
            renderRoutine();
        }

        function editExercise(index) {
            let ex = myRoutine[index];
            
            // Populate inputs with current data
            document.getElementById("exerciseSelect").value = ex[0];
            document.getElementById("targetSets").value = ex[1];
            document.getElementById("targetReps").value = ex[2];
            document.getElementById("targetWeight").value = ex[3];

            // Change form to Edit Mode
            editingIndex = index;
            document.getElementById("formTitle").innerText = "Edit Exercise";
            document.getElementById("addUpdateBtn").innerText = "Update Exercise";
            
            // Scroll to top so user sees the edit form
            window.scrollTo(0, 0);
        }

        // --- NEW FEATURE: EXPORT ---
        function exportJSON() {
            const routineName = document.getElementById("routineName").value || "My_Routine";
            const finalData = { n: routineName, e: myRoutine };
            
            // Create a downloadable file in the browser
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(finalData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            // Replace spaces with underscores for the file name
            downloadAnchorNode.setAttribute("download", routineName.replace(/\s+/g, '_') + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // --- NEW FEATURE: IMPORT ---
        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    // Validate that it's our specific format (has 'n' and 'e')
                    if (importedData.n !== undefined && Array.isArray(importedData.e)) {
                        document.getElementById("routineName").value = importedData.n;
                        myRoutine = importedData.e;
                        renderRoutine();
                        alert("Routine loaded successfully!");
                    } else {
                        alert("Invalid file format. Ensure it was created by this app.");
                    }
                } catch (err) {
                    alert("Error reading file. Is it a valid JSON?");
                }
                // Reset file input so you can import the same file again if needed
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        function getQueryParam(variable, defaultValue) {
            var query = location.search.substring(1);
            var vars = query.split('&');
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split('=');
                if (pair[0] === variable) {
                    return decodeURIComponent(pair[1]);
                }
            }
            return defaultValue || 'pebblejs://close#';
        }

        function saveAndSend() {
            const routineName = document.getElementById("routineName").value;
            if (myRoutine.length === 0) {
                alert("Please add at least one exercise.");
                return;
            }

            const finalData = { n: routineName, e: myRoutine };
            const jsonString = JSON.stringify(finalData);

            var returnTo = getQueryParam('return_to', 'pebblejs://close#');
            window.location.href = returnTo + encodeURIComponent(jsonString);
        }
    </script>
</body>
</html>
